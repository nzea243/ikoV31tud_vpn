name: Auto-Update and Sync to GitVerse

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install deps
        run: pip install requests

      - name: Update Configs
        run: python update_configs.py

      - name: Commit and Push to GitHub
        run: |
          git config --global user.name "nzea-bot"
          git config --global user.email "nzea-bot@users.noreply.github.com"
          git add tri_228.txt
          if git diff --staged --quiet; then
            echo "Нет изменений, коммит не нужен."
          else
            git commit -m "⚡ update configs $(date +'%d.%m.%Y %H:%M')"
            git push origin main
          fi

  mirror:
    runs-on: ubuntu-latest
    needs: update
    if: always()
    permissions:
      contents: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to GitVerse
        run: |
          # Подтягиваем СВЕЖИЙ origin — включая коммит от update джоба
          git fetch origin
          git reset --hard origin/main

          git remote add gitverse https://gitverse.ru/nzea234/nzea234-kvn.git
          git config --global credential.helper store
          echo "https://nzea234:${{ secrets.MIRROR_OKAK_67_KVN_BS }}@gitverse.ru" > ~/.git-credentials
          git push --mirror gitverse
