name: Mirror to GitVerse

on:
  push:
    branches:
      - '**'  # все ветки

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # обязательно, иначе история обрежется

      - name: Push mirror to GitVerse
        run: |
          git remote add gitverse https://gitverse.ru/nzea234/nzea234-kvn.git
          git config --global credential.helper store
          echo "https://nzea234:${{ secrets.MIRROR_OKAK_67_KVN_BS }}@gitverse.ru" > ~/.git-credentials
          git push --mirror gitverse
