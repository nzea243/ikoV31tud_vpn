name: Update VPN Configs

on:
  schedule:
    - cron: '17,47 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run updater
        run: python update_configs.py

      - name: Commit & push to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tri_228.txt
          if git diff --staged --quiet; then
            echo "Нет изменений."
          else
            git commit -m "⚡ update configs $(date -u '+%H:%M %d.%m.%Y UTC')"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Push tri_228.txt to GitVerse
        run: |
          git clone https://nzea234:${{ secrets.MIRROR_OKAK_67_KVN_BS }}@gitverse.ru/nzea234/nzea234-kvn.git gitverse_repo
          cp tri_228.txt gitverse_repo/tri_228.txt
          cd gitverse_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tri_228.txt
          if git diff --staged --quiet; then
            echo "Нет изменений на GitVerse."
          else
            git commit -m "⚡ update configs $(date -u '+%H:%M %d.%m.%Y UTC')"
            git push origin main
          fi
